name: spectre-scan
services:
  app:
    image: ecsypno/spectre-scan
    platform: linux/amd64
    working_dir: /home/spectre
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    # Keep the container alive without burning an interactive bash as PID 1
    # (which would prematurely fire ~/.bashrc and the auto-setup block before
    # the user has a chance to enter via `docker compose exec app bash`).
    command: ["tail", "-f", "/dev/null"]
    ports:
      - 9292:9292 # Pro WebUI.
      - 7331:7331 # Free.
      - 7332:7332 # Free.
      - 7333:7333 # Free.
